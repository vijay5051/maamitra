name: Build Native App (Android / iOS)

# Manual trigger from the GitHub Actions UI: pick a platform and an
# optional auto-submit flag. EAS Build runs on Expo's infra (cloud), so
# this workflow just needs an EXPO_TOKEN — env vars come from the EAS
# production environment automatically.

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform'
        required: true
        default: 'android'
        type: choice
        options: [android, ios, all]
      profile:
        description: 'Build profile'
        required: true
        default: 'production'
        type: choice
        options: [production, preview, development]
      submit:
        description: 'Auto-submit to store after build (production only)'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EAS_BUILD_NO_EXPO_GO_WARNING: 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build (with optional submit)
        run: |
          SUBMIT_FLAG=""
          if [ "${{ inputs.submit }}" = "true" ] && [ "${{ inputs.profile }}" = "production" ]; then
            SUBMIT_FLAG="--auto-submit"
          fi
          npx eas-cli build \
            --platform ${{ inputs.platform }} \
            --profile ${{ inputs.profile }} \
            --non-interactive \
            --no-wait \
            $SUBMIT_FLAG
