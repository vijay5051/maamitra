name: Deploy Web + Ship OTA

# Runs on every push to main:
#   1. Pulls env from EAS production environment (single source of truth).
#   2. Builds the web bundle and deploys to Firebase Hosting.
#   3. Publishes an OTA update to the production EAS channel — installed
#      mobile apps on the matching runtimeVersion get the JS changes on
#      next launch.
#
# Manual trigger lets you re-deploy current main without a new commit.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      message:
        description: 'OTA update message (defaults to commit subject)'
        required: false
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      EAS_BUILD_NO_EXPO_GO_WARNING: 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Pull env from EAS production
        run: |
          rm -f .env
          npx eas-cli env:pull production --path .env --non-interactive

      - name: Build web bundle
        run: npm run build:web

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: maa-mitra-7kird8

      - name: Compute OTA message
        id: ota_msg
        run: |
          if [ -n "${{ github.event.inputs.message }}" ]; then
            echo "msg=${{ github.event.inputs.message }}" >> "$GITHUB_OUTPUT"
          else
            FIRST_LINE=$(git log -1 --pretty=%s)
            echo "msg=$FIRST_LINE" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish OTA update
        run: npx eas-cli update --branch production --message "${{ steps.ota_msg.outputs.msg }}" --non-interactive
