name: OTA Update Only (skip web deploy)

# Use this when you just want to push a JS-only OTA without re-deploying
# the web bundle. Most of the time the regular "Deploy Web + Ship OTA"
# workflow on push-to-main is what you want — this is a manual escape
# hatch (e.g., re-publish current main, or push a different branch).

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'EAS update branch'
        required: true
        default: 'production'
      message:
        description: 'Update message'
        required: true
        default: 'Bug fixes and improvements'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Pull env from EAS production
        run: |
          rm -f .env
          npx eas-cli env:pull production --path .env --non-interactive

      - name: Publish OTA update
        run: npx eas-cli update --branch "${{ inputs.branch }}" --message "${{ inputs.message }}" --non-interactive
